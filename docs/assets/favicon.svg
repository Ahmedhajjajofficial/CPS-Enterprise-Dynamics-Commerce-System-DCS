<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .favicon-fill { fill: #000000; }
      .favicon-white { fill: #ffffff; }
    </style>
  </defs>

  <rect width="100" height="100" fill="#1a1a2e" rx="20"/>

  <!-- Anubis head -->
  <g transform="translate(50, 40)">
    <!-- Head shape -->
    <path d="M -15 5 Q -18 0 -15 -8 Q -10 -12 0 -12 Q 10 -12 15 -8 Q 18 0 15 5 L 10 8 Q 0 12 -10 8 Z" class="favicon-fill"/>

    <!-- Ears -->
    <path d="M -8 -10 Q -12 -18 -10 -5 Q -8 -2 -5 -3 Z" class="favicon-fill"/>
    <path d="M 8 -10 Q 12 -18 10 -5 Q 8 -2 5 -3 Z" class="favicon-fill"/>

    <!-- Eye -->
    <circle cx="-4" cy="-2" r="1.5" class="favicon-white"/>

    <!-- Ankh -->
    <circle cx="0" cy="10" r="3" class="favicon-white"/>
    <rect x="-1" y="13" width="2" height="6" class="favicon-white"/>
    <rect x="-3" y="16" width="6" height="1.5" class="favicon-white"/>
  </g>
</svg>