<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Anubis head with ankh symbol -->
  <defs>
    <style>
      .logo-fill { fill: #000000; }
      .logo-stroke { fill: none; stroke: #ffffff; stroke-width: 2; }
    </style>
  </defs>

  <!-- Anubis silhouette -->
  <g class="logo-fill">
    <!-- Head -->
    <path d="M 70 40 Q 65 35 60 40 L 55 50 Q 50 60 55 70 L 60 75 Q 70 80 80 75 L 85 70 Q 90 60 85 50 Z"/>

    <!-- Ears -->
    <path d="M 60 35 Q 55 25 50 30 L 48 45 Q 52 50 60 45 Z"/>
    <path d="M 80 35 Q 85 25 90 30 L 92 45 Q 88 50 80 45 Z"/>

    <!-- Neck and body -->
    <path d="M 65 75 Q 60 90 65 110 L 75 110 Q 80 90 75 75 Z"/>

    <!-- Snout -->
    <path d="M 75 60 L 90 55 Q 95 60 90 70 L 75 70 Z"/>

    <!-- Eye detail -->
    <circle cx="70" cy="50" r="3" class="logo-stroke"/>
  </g>

  <!-- Ankh symbol on chest -->
  <g transform="translate(75, 85)">
    <circle cx="0" cy="-8" r="5" stroke="#ffffff" stroke-width="2" fill="none"/>
    <rect x="-2" y="0" width="4" height="12" fill="#ffffff"/>
    <path d="M -6 3 L 6 3" stroke="#ffffff" stroke-width="2" fill="none"/>
  </g>
</svg>